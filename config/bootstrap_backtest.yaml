project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  bars_csv: data/raw/daily_bars/akshare_daily_bars_bootstrap.csv
  signals_csv: data/sample/free_bootstrap_signals.csv
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

universe:
  exclude_st: true
  exclude_suspended: true
  min_listed_days: 0
  min_turnover: 0
  min_close: 0

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001
