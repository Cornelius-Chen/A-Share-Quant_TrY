project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  bars_csv: data/sample/segcomp_strategy_daily_bars.csv
  index_bars_csv: data/sample/segcomp_index_daily_bars.csv
  sector_snapshots_csv: data/sample/segcomp_sector_snapshots.csv
  stock_snapshots_csv: data/sample/segcomp_stock_snapshots.csv
  mainline_windows_csv: data/sample/segcomp_mainline_windows.csv
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

universe:
  exclude_st: true
  exclude_suspended: true
  min_listed_days: 60
  min_turnover: 50000000
  min_close: 3.0

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

regime:
  segmentation_method: sector_trend
  segmentation_methods:
    - index_trend
    - sector_trend
    - resonance
  index_window: 2
  index_min_return: 0.01
  sector_score_threshold: 4.0
  min_segment_length: 2
  min_top_score: 4.0
  min_score_margin: 0.2

trend:
  hierarchy:
    min_resonance_for_core: 0.55
    min_quality_for_late_mover: 0.55
    min_composite_for_non_junk: 0.60
  filters:
    short_window: 2
    medium_window: 3
    long_window: 4
    loose_window: 5
    repair_window: 3
  entry_rules:
    confirmation_window: 2
    medium_window: 3
    breakout_lookback: 4
  holding:
    medium_window: 3
    min_health_score_to_hold: 1.5
  exit_guard:
    medium_window: 3

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c
  buy_quantity: 100
