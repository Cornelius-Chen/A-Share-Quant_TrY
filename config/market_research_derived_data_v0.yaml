protocol_version: protocol_v1.0
mapping_source: akshare_cninfo
mapping_version: cninfo_market_research_v0

paths:
  bars_csv: data/raw/daily_bars/akshare_daily_bars_market_research_v0.csv
  mapping_input_csv: data/reference/sector_mapping_daily/market_research_sector_mapping_cninfo_v0.csv
  concept_mapping_input_csv: data/reference/concept_mapping_daily/market_research_concept_mapping_v0.csv
  mapping_output_csv: data/reference/sector_mapping_daily/market_research_sector_mapping_daily_v0.csv
  sector_snapshots_output_csv: data/derived/sector_snapshots/market_research_sector_snapshots_v0.csv
  stock_snapshots_output_csv: data/derived/stock_snapshots/market_research_stock_snapshots_v0.csv
  mainline_windows_output_csv: data/derived/mainline_windows/market_research_mainline_windows_v0.csv

rules:
  lookback: 5
  top_sector_score_threshold: 0.52
  top_sector_rank_limit: 1
  min_window_length: 2

sector_assignments:
  "000002":
    sector_id: REALTY
    sector_name: Realty
