project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: theme_research_v1
    config_path: config/theme_research_strategy_suite.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: control_v1
    description: Current baseline protocol thresholds.
    override: {}
  - candidate_name: quality_threshold_only
    description: Tighten regime and hierarchy quality gates while keeping hold and entry near baseline.
    override:
      regime:
        min_top_score: 2.7
        min_score_margin: 0.08
      trend:
        hierarchy:
          min_resonance_for_core: 0.58
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.58
        filters:
          short_window: 3
          medium_window: 4
          long_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
  - candidate_name: hold_discipline_only
    description: Keep quality near baseline but require healthier holds and slower exit confirmation.
    override:
      regime:
        min_top_score: 2.5
        min_score_margin: 0.02
      trend:
        hierarchy:
          min_resonance_for_core: 0.56
          min_quality_for_late_mover: 0.56
          min_composite_for_non_junk: 0.56
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          repair_window: 3
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.3
        exit_guard:
          medium_window: 4
  - candidate_name: selective_entry
    description: Slower entry confirmation with moderate quality tightening.
    override:
      regime:
        min_top_score: 2.7
        min_score_margin: 0.08
      trend:
        hierarchy:
          min_resonance_for_core: 0.58
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.58
        filters:
          short_window: 3
          medium_window: 4
          long_window: 6
          repair_window: 5
        entry_rules:
          medium_window: 4
          breakout_lookback: 6
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 4
  - candidate_name: strict_quality
    description: Full strict-quality package with tighter hold discipline.
    override:
      regime:
        min_top_score: 2.8
        min_score_margin: 0.1
      trend:
        hierarchy:
          min_resonance_for_core: 0.60
          min_quality_for_late_mover: 0.65
          min_composite_for_non_junk: 0.60
        filters:
          short_window: 3
          medium_window: 4
          long_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 4
          breakout_lookback: 5
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.2
        exit_guard:
          medium_window: 4


