project:
  name: a_share_quant
  protocol_version: protocol_v1.1

paths:
  bars_csv: data/raw/daily_bars/akshare_daily_bars_market_research_v1.csv
  index_bars_csv: data/raw/index_daily_bars/akshare_index_daily_bars_market_research_v1.csv
  sector_snapshots_csv: data/derived/sector_snapshots/market_research_sector_snapshots_v1.csv
  stock_snapshots_csv: data/derived/stock_snapshots/market_research_stock_snapshots_v1.csv
  mainline_windows_csv: data/derived/mainline_windows/market_research_mainline_windows_v1.csv
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

universe:
  exclude_st: true
  exclude_suspended: true
  min_listed_days: 0
  min_turnover: 0
  min_close: 0

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

regime:
  segmentation_method: sector_trend
  index_window: 5
  index_min_return: 0.005
  sector_score_threshold: 2.5
  min_segment_length: 2
  min_top_score: 2.5
  min_score_margin: 0.0

trend:
  hierarchy:
    min_resonance_for_core: 0.55
    min_quality_for_late_mover: 0.55
    min_composite_for_non_junk: 0.55
  filters:
    short_window: 2
    medium_window: 3
    long_window: 5
    loose_window: 5
    repair_window: 3
  entry_rules:
    confirmation_window: 2
    medium_window: 3
    breakout_lookback: 4
  holding:
    medium_window: 3
    min_health_score_to_hold: 1.0
  exit_guard:
    medium_window: 3

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c
  buy_quantity: 100


