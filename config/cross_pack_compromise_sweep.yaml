project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml
  - dataset_name: theme_research_v1
    config_path: config/theme_research_strategy_suite.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: shared_default
    description: Shared default protocol thresholds on both research packs.
    override: {}
  - candidate_name: theme_capture_relief_branch
    description: Cross-pack compromise candidate surfaced by the first promotion screen.
    override:
      regime:
        min_top_score: 2.7
        min_score_margin: 0.08
      trend:
        hierarchy:
          min_resonance_for_core: 0.58
          min_quality_for_late_mover: 0.62
          min_composite_for_non_junk: 0.58
        filters:
          short_window: 3
          medium_window: 4
          long_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 4
          breakout_lookback: 5
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.2
        exit_guard:
          medium_window: 4
  - candidate_name: balanced_compromise
    description: Midpoint between the shared default and stricter-quality branch.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: quality_floor_with_faster_entry
    description: Keep a moderate quality floor but restore faster entry timing.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: expansion_with_quality_floor
    description: Preserve some expansion breadth while lifting the weakest hierarchy names out.
    override:
      regime:
        min_top_score: 2.5
        min_score_margin: 0.02
      trend:
        hierarchy:
          min_resonance_for_core: 0.54
          min_quality_for_late_mover: 0.55
          min_composite_for_non_junk: 0.54
        filters:
          short_window: 2
          medium_window: 3
          long_window: 4
          loose_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 5
        holding:
          medium_window: 3
          min_health_score_to_hold: 0.95
        exit_guard:
          medium_window: 3


