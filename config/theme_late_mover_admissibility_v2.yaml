project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  reports_dir: reports/analysis

report:
  name: theme_late_mover_admissibility_v2

dataset:
  dataset_name: theme_research_v3
  config_path: config/theme_research_strategy_suite_v3.yaml

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

strategy:
  strategy_names:
    - mainline_trend_c

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: balanced_targeted_timing_repair
    description: Repair-window reset plus small sector-switch buffer.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
        switch_margin_buffer: 0.10
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3

analysis:
  lookback_days: 5
  top_k: 20

comparison:
  incumbent_candidate: shared_default
  challenger_candidate: balanced_targeted_timing_repair


