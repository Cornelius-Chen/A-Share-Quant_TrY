project:
  name: a_share_quant
  protocol_version: protocol_v1.1

paths:
  reports_dir: reports/analysis

report:
  name: market_v1_q3_trade_divergence_quality_c_v1

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

dataset:
  dataset_name: market_research_v1
  config_path: config/market_research_strategy_suite_v1.yaml

slice:
  slice_name: 2024_q3
  start_date: 2024-07-01
  end_date: 2024-09-30

strategy:
  strategy_names:
    - mainline_trend_c

comparison:
  incumbent_candidate: shared_default
  challenger_candidate: theme_strict_quality_branch

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: theme_strict_quality_branch
    description: Drawdown specialist branch.
    override:
      regime:
        min_top_score: 2.8
        min_score_margin: 0.1
      trend:
        hierarchy:
          min_resonance_for_core: 0.60
          min_quality_for_late_mover: 0.65
          min_composite_for_non_junk: 0.60
        filters:
          short_window: 3
          medium_window: 4
          long_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 4
          breakout_lookback: 5
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.2
        exit_guard:
          medium_window: 4
