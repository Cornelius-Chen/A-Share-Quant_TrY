project:
  protocol_version: protocol_v1.2

provider:
  name: akshare
  adjust: qfq
  pause_seconds: 0.2

paths:
  raw_dir: data/raw
  reference_dir: data/reference

time_range:
  start_date: "2024-01-01"
  end_date: "2024-12-31"

universe:
  stock_symbols_file: config/universes/market_research_v4_carry_row_diversity_refresh.txt
  index_symbols_file: config/universes/common_indices_v1.txt

outputs:
  daily_bars_filename: akshare_daily_bars_market_research_v4_carry_row_diversity_refresh.csv
  index_daily_bars_filename: akshare_index_daily_bars_market_research_v4_carry_row_diversity_refresh.csv
  trading_calendar_filename: akshare_trading_calendar_market_research_v4_carry_row_diversity_refresh.csv
  security_master_filename: akshare_security_master_market_research_v4_carry_row_diversity_refresh.csv
  adjustment_factors_filename: akshare_adjustment_factors_market_research_v4_carry_row_diversity_refresh.csv
