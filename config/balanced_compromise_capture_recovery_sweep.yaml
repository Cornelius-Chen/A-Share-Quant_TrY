project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1_balanced_branch
    config_path: config/baseline_research_strategy_suite_balanced_compromise.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: balanced_control
    description: Current balanced-compromise baseline.
    override: {}
  - candidate_name: balanced_regime_relief
    description: Lower top-score and margin slightly to admit more borderline baseline windows.
    override:
      regime:
        min_top_score: 2.5
        min_score_margin: 0.02
  - candidate_name: balanced_hierarchy_relief
    description: Loosen core and late-mover admission slightly while keeping regime and holding unchanged.
    override:
      trend:
        hierarchy:
          min_resonance_for_core: 0.55
          min_quality_for_late_mover: 0.57
          min_composite_for_non_junk: 0.55
  - candidate_name: balanced_entry_relief
    description: Speed up confirmation and medium-window entry timing to recover continuation capture.
    override:
      trend:
        entry_rules:
          confirmation_window: 1
          medium_window: 2
  - candidate_name: balanced_capture_combo
    description: Combine mild regime relief, hierarchy relief, and faster entry while keeping hold discipline unchanged.
    override:
      regime:
        min_top_score: 2.5
        min_score_margin: 0.02
      trend:
        hierarchy:
          min_resonance_for_core: 0.55
          min_quality_for_late_mover: 0.57
          min_composite_for_non_junk: 0.55
        entry_rules:
          confirmation_window: 1
          medium_window: 2
