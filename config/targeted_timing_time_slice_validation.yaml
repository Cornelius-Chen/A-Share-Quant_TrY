project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml
  - dataset_name: theme_research_v2
    config_path: config/theme_research_strategy_suite_v2.yaml
  - dataset_name: market_research_v0
    config_path: config/market_research_strategy_suite_v0.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

validation:
  slices:
    - slice_name: 2024_q1
      start_date: 2024-01-01
      end_date: 2024-03-31
    - slice_name: 2024_q2
      start_date: 2024-04-01
      end_date: 2024-06-30
    - slice_name: 2024_q3
      start_date: 2024-07-01
      end_date: 2024-09-30
    - slice_name: 2024_q4
      start_date: 2024-10-01
      end_date: 2024-12-31

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: balanced_targeted_timing_repair
    description: Repair-window reset plus small sector-switch buffer.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
        switch_margin_buffer: 0.10
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
