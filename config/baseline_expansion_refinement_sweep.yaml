project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1_expansion_branch
    config_path: config/baseline_research_strategy_suite_expansion.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: expansion_branch_control
    description: Current local branch winner with full expansion-capture settings.
    override: {}
  - candidate_name: expansion_regime_guard
    description: Keep expansion structure but require slightly stronger top-sector confirmation.
    override:
      regime:
        min_top_score: 2.4
        min_score_margin: 0.02
  - candidate_name: expansion_tighter_hold
    description: Keep expansion entry breadth but raise hold health slightly to control drawdown.
    override:
      trend:
        holding:
          min_health_score_to_hold: 0.9
        exit_guard:
          medium_window: 4
  - candidate_name: expansion_trimmed_late_mover
    description: Keep broad expansion entry but trim the weakest late-mover layer slightly.
    override:
      trend:
        hierarchy:
          min_resonance_for_core: 0.52
          min_quality_for_late_mover: 0.48
          min_composite_for_non_junk: 0.52
  - candidate_name: expansion_faster_breakout
    description: Keep diffusion breadth but shorten breakout lookback for earlier continuation entry.
    override:
      trend:
        entry_rules:
          breakout_lookback: 4
