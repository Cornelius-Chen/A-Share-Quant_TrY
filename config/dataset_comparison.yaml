project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

datasets:
  - dataset_name: baseline_bootstrap
    config_path: config/bootstrap_strategy_suite.yaml
  - dataset_name: theme_bootstrap
    config_path: config/theme_bootstrap_strategy_suite.yaml
