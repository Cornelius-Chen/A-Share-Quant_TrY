project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml
  - dataset_name: theme_research_v4
    config_path: config/theme_research_strategy_suite_v4.yaml
  - dataset_name: market_research_v0
    config_path: config/market_research_strategy_suite_v0.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: buffer_only_012
    description: Best current buffer-only candidate.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
        switch_margin_buffer: 0.12
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: buffer012_margin055
    description: Slightly higher regime score margin on top of buffer-only candidate.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.055
        switch_margin_buffer: 0.12
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: buffer011_margin055
    description: Slightly lower buffer plus mild extra regime margin.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.055
        switch_margin_buffer: 0.11
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: buffer012_top262
    description: Tiny increase in min top score with same buffer-only shape.
    override:
      regime:
        min_top_score: 2.62
        min_score_margin: 0.05
        switch_margin_buffer: 0.12
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
