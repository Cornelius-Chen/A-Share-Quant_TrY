project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: control_v1
    description: Current baseline protocol thresholds.
    override: {}
  - candidate_name: entry_breadth_only
    description: Looser trend and breakout entry width without relaxing hierarchy gates.
    override:
      regime:
        min_top_score: 2.4
        min_score_margin: 0.0
      trend:
        filters:
          short_window: 2
          medium_window: 2
          long_window: 4
          loose_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 0.9
  - candidate_name: late_mover_breadth_only
    description: Wider late-mover and core admission while keeping entry timing near baseline.
    override:
      regime:
        min_top_score: 2.4
      trend:
        hierarchy:
          min_resonance_for_core: 0.52
          min_quality_for_late_mover: 0.48
          min_composite_for_non_junk: 0.52
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
  - candidate_name: balanced_hybrid
    description: Moderate entry breadth plus moderate late-mover widening.
    override:
      regime:
        min_top_score: 2.4
        min_score_margin: 0.0
      trend:
        hierarchy:
          min_resonance_for_core: 0.53
          min_quality_for_late_mover: 0.50
          min_composite_for_non_junk: 0.53
        filters:
          short_window: 2
          medium_window: 2
          long_window: 4
          loose_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 0.9
  - candidate_name: expansion_capture
    description: Full looser expansion thresholds for broader diffusion capture.
    override:
      regime:
        min_top_score: 2.3
        min_score_margin: 0.0
      trend:
        hierarchy:
          min_resonance_for_core: 0.50
          min_quality_for_late_mover: 0.45
          min_composite_for_non_junk: 0.50
        filters:
          short_window: 2
          medium_window: 3
          long_window: 4
          loose_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 5
        holding:
          medium_window: 3
          min_health_score_to_hold: 0.8
