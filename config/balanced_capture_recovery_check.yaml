project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml
  - dataset_name: theme_research_v1
    config_path: config/theme_research_strategy_suite.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: balanced_compromise
    description: Current shared-default challenger.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: balanced_hierarchy_relief
    description: Recovery attempt that loosens only hierarchy admission around balanced_compromise.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
      trend:
        hierarchy:
          min_resonance_for_core: 0.55
          min_quality_for_late_mover: 0.57
          min_composite_for_non_junk: 0.55
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 4
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
