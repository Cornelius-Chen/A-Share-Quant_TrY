project:
  name: a_share_quant
  protocol_version: protocol_v1.2

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 1.2
  stamp_tax_bps: 5.0
  transfer_fee_bps: 0.1
  exchange_handling_bps: 0.341
  regulatory_fee_bps: 0.2
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: baseline_research_v1
    config_path: config/baseline_research_strategy_suite.yaml
  - dataset_name: theme_research_v4
    config_path: config/theme_research_strategy_suite_v4.yaml
  - dataset_name: market_research_v1
    config_path: config/market_research_strategy_suite_v1.yaml
  - dataset_name: market_research_v2_seed
    config_path: config/market_research_strategy_suite_v2_seed.yaml
  - dataset_name: market_research_v2_refresh
    config_path: config/market_research_strategy_suite_v2_refresh.yaml
  - dataset_name: market_research_v3_factor_diversity_seed
    config_path: config/market_research_strategy_suite_v3_factor_diversity_seed.yaml
  - dataset_name: market_research_v4_carry_row_diversity_refresh
    config_path: config/market_research_strategy_suite_v4_carry_row_diversity_refresh.yaml
  - dataset_name: market_research_v5_carry_row_diversity_refresh
    config_path: config/market_research_strategy_suite_v5_carry_row_diversity_refresh.yaml
  - dataset_name: market_research_v6_catalyst_supported_carry_persistence_refresh
    config_path: config/market_research_strategy_suite_v6_catalyst_supported_carry_persistence_refresh.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

validation:
  slices:
    - slice_name: 2024_q1
      start_date: 2024-01-01
      end_date: 2024-03-31
    - slice_name: 2024_q2
      start_date: 2024-04-01
      end_date: 2024-06-30
    - slice_name: 2024_q3
      start_date: 2024-07-01
      end_date: 2024-09-30
    - slice_name: 2024_q4
      start_date: 2024-10-01
      end_date: 2024-12-31

candidates:
  - candidate_name: shared_default
    description: Current official shared default.
    override: {}
  - candidate_name: buffer_only_012
    description: Current strongest frozen challenger.
    override:
      regime:
        min_top_score: 2.6
        min_score_margin: 0.05
        switch_margin_buffer: 0.12
      trend:
        hierarchy:
          min_resonance_for_core: 0.57
          min_quality_for_late_mover: 0.60
          min_composite_for_non_junk: 0.57
        filters:
          short_window: 2
          medium_window: 3
          long_window: 5
          loose_window: 5
          repair_window: 3
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
        holding:
          medium_window: 3
          min_health_score_to_hold: 1.0
        exit_guard:
          medium_window: 3
  - candidate_name: baseline_expansion_branch
    description: Capture specialist branch.
    override:
      regime:
        min_top_score: 2.3
        min_score_margin: 0.0
      trend:
        hierarchy:
          min_resonance_for_core: 0.50
          min_quality_for_late_mover: 0.45
          min_composite_for_non_junk: 0.50
        filters:
          short_window: 2
          medium_window: 3
          long_window: 4
          loose_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 2
          breakout_lookback: 5
        holding:
          medium_window: 3
          min_health_score_to_hold: 0.8
        exit_guard:
          medium_window: 3
  - candidate_name: theme_strict_quality_branch
    description: Drawdown specialist branch.
    override:
      regime:
        min_top_score: 2.8
        min_score_margin: 0.1
      trend:
        hierarchy:
          min_resonance_for_core: 0.60
          min_quality_for_late_mover: 0.65
          min_composite_for_non_junk: 0.60
        filters:
          short_window: 3
          medium_window: 4
          long_window: 6
          repair_window: 4
        entry_rules:
          medium_window: 4
          breakout_lookback: 5
        holding:
          medium_window: 4
          min_health_score_to_hold: 1.2
        exit_guard:
          medium_window: 4
