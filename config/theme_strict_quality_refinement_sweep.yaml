project:
  name: a_share_quant
  protocol_version: protocol_v1.0

paths:
  runs_dir: experiments/runs
  reports_dir: reports

backtest:
  initial_cash: 1000000
  price_field: open

cost_model:
  commission_bps: 3.0
  stamp_tax_bps: 10.0
  min_commission: 5.0

limit_model:
  daily_limit_pct: 0.10
  epsilon: 0.0001

datasets:
  - dataset_name: theme_research_v1_strict_quality_branch
    config_path: config/theme_research_strategy_suite_strict_quality.yaml

strategy:
  strategy_names:
    - mainline_trend_a
    - mainline_trend_b
    - mainline_trend_c

candidates:
  - candidate_name: strict_quality_branch_control
    description: Current local branch winner with fully tightened quality settings.
    override: {}
  - candidate_name: strict_quality_capture_relief
    description: Loosen regime and hierarchy quality gates slightly to recover capture.
    override:
      regime:
        min_top_score: 2.7
        min_score_margin: 0.08
      trend:
        hierarchy:
          min_resonance_for_core: 0.58
          min_quality_for_late_mover: 0.62
          min_composite_for_non_junk: 0.58
  - candidate_name: strict_quality_faster_entry
    description: Keep strict quality gates but allow earlier confirmation and breakout entry.
    override:
      trend:
        entry_rules:
          medium_window: 3
          breakout_lookback: 4
  - candidate_name: strict_quality_hold_relief
    description: Keep strict quality selection but reduce hold-health pressure slightly.
    override:
      trend:
        holding:
          min_health_score_to_hold: 1.1
        exit_guard:
          medium_window: 3
  - candidate_name: strict_quality_margin_only
    description: Keep the strict package but reduce top-sector score margin pressure slightly.
    override:
      regime:
        min_score_margin: 0.08
