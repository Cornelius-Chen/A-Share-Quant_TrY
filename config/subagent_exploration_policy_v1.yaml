policy_name: subagent_exploration_policy_v1
posture: exploration_layer_only
goal: >
  Use subagents as bounded hypothesis-bandwidth multipliers for repetitive
  non-blocking exploration work, without letting them alter mainline judgment,
  labels, or promotion gates.

limits:
  max_parallel_subagents: 2
  max_tasks_per_round: 3
  default_compute_class: low
  allow_heavy_models: false
  allow_scope_widening: false
  allow_label_rewrite: false
  allow_phase_decision: false

task_requirements:
  required_fields:
    - hypothesis
    - success_if
    - stop_if
    - used_for
    - fixed_dataset_or_pool
    - fixed_output_template
  reject_if_missing_any_required_field: true

allowed_task_classes:
  - hotspot_bucketization
  - feature_ablation_batch
  - constrained_proxy_generation
  - review_sheet_generation
  - candidate_prescreen_under_frozen_rules

disallowed_task_classes:
  - label_schema_definition
  - feature_candidacy_or_promotion_decision
  - strategy_signal_definition
  - execution_timing_decision
  - phase_switch_decision
  - open_ended_model_search
  - wide_dataset_growth

termination:
  no_signal_then_stop: true
  no_follow_on_if_discarded: true
  owner_review_required_before_any_consumption: true
